<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PortalGuy | Profile</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ==========================================================================
           1. CSS VARIABLES & THEME SETUP
           ========================================================================== */
        :root {
            /* Core Background Colors */
            --bg-base: #09090b;
            --bg-gradient-start: #121214;
            --bg-gradient-end: #09090b;
            
            /* Glassmorphism Card Properties */
            --card-bg: rgba(24, 24, 27, 0.55);
            --card-border-light: rgba(255, 255, 255, 0.08);
            --card-border-glow: rgba(255, 255, 255, 0.15);
            --card-shadow-base: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            --card-blur-amount: blur(30px);
            
            /* Typography Colors */
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --text-tertiary: #71717a;
            
            /* Status Indicators */
            --status-online: #23a559;
            --status-online-glow: rgba(35, 165, 89, 0.5);
            --status-offline: #80848e;
            --status-offline-glow: rgba(128, 132, 142, 0.3);
            
            /* Brand Colors & Glows */
            --brand-discord: #5865F2;
            --brand-discord-glow: rgba(88, 101, 242, 0.6);
            --brand-spotify: #1DB954;
            --brand-spotify-glow: rgba(29, 185, 84, 0.6);
            --brand-github: #ffffff;
            --brand-github-glow: rgba(255, 255, 255, 0.4);
            
            /* Structural Variables */
            --card-width: 340px;
            --radius-round: 50%;
            --radius-xl: 24px;
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-sm: 8px;
            
            /* Animation Timings */
            --ease-fast: 0.15s ease-out;
            --ease-normal: 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            --ease-slow: 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
            --ease-bounce: 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* ==========================================================================
           2. RESET & FOUNDATION
           ========================================================================== */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* Prevent scrolling due to particles */
            position: relative;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        a {
            text-decoration: none;
            color: inherit;
            -webkit-tap-highlight-color: transparent;
        }

        /* ==========================================================================
           3. DYNAMIC BACKGROUND EFFECTS
           ========================================================================== */
        
        /* Particle Canvas Layer */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            pointer-events: none;
        }

        /* Ambient Animated Gradient Layer */
        .ambient-glow {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200vw;
            height: 200vh;
            background: radial-gradient(circle at 50% 50%, rgba(88, 101, 242, 0.08) 0%, rgba(9, 9, 11, 1) 60%);
            z-index: 0;
            animation: breatheGlow 12s ease-in-out infinite alternate;
            pointer-events: none;
        }

        .ambient-glow.spotify-mode {
            background: radial-gradient(circle at 50% 50%, rgba(29, 185, 84, 0.06) 0%, rgba(9, 9, 11, 1) 60%);
        }

        /* ==========================================================================
           4. PROFILE CARD CONTAINER
           ========================================================================== */
        
        .profile-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: var(--card-width);
            padding: 20px;
            perspective: 2000px; /* Enhanced 3D depth */
        }

        .profile-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border-light);
            border-radius: var(--radius-xl);
            padding: 40px 24px 30px 24px; /* Top padding replaces the banner */
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            box-shadow: var(--card-shadow-base), 
                        inset 0 1px 0 0 rgba(255, 255, 255, 0.05);
            backdrop-filter: var(--card-blur-amount);
            -webkit-backdrop-filter: var(--card-blur-amount);
            transform-style: preserve-3d;
            transition: transform var(--ease-normal), 
                        box-shadow var(--ease-normal), 
                        border-color var(--ease-normal);
            animation: cardDropIn 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(50px) scale(0.9) rotateX(-10deg);
        }

        /* Interactive Card Hover Depth */
        .profile-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 40px 80px -15px rgba(0, 0, 0, 0.9), 
                        0 0 50px rgba(88, 101, 242, 0.1),
                        inset 0 1px 0 0 rgba(255, 255, 255, 0.15);
            border-color: var(--card-border-glow);
        }

        /* ==========================================================================
           5. AVATAR & STATUS INDICATOR
           ========================================================================== */
        
        .avatar-section {
            position: relative;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            transform: translateZ(30px); /* 3D pop effect */
        }

        .avatar-wrapper {
            position: relative;
            width: 110px;
            height: 110px;
            border-radius: var(--radius-round);
            background-color: var(--bg-base);
            padding: 6px;
            transition: transform var(--ease-bounce), filter var(--ease-normal);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .profile-card:hover .avatar-wrapper {
            transform: scale(1.08) translateY(-4px);
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.1));
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            border-radius: var(--radius-round);
            object-fit: cover;
            background-color: #2b2d31; /* Discord dark placeholder */
            position: relative;
            z-index: 1;
        }

        /* Dynamic Status Indicator Overlay */
        .status-badge {
            position: absolute;
            bottom: 4px;
            right: 4px;
            width: 28px;
            height: 28px;
            background-color: var(--card-bg);
            border-radius: var(--radius-round);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid transparent; /* Allows clipping match */
        }

        .status-dot {
            width: 16px;
            height: 16px;
            border-radius: var(--radius-round);
            background-color: var(--status-offline);
            transition: background-color var(--ease-normal), box-shadow var(--ease-normal);
            position: relative;
        }

        /* Online pulsing effect injected via JS class */
        .status-dot.online {
            background-color: var(--status-online);
            box-shadow: 0 0 12px var(--status-online-glow);
        }

        .status-dot.online::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: var(--radius-round);
            background-color: var(--status-online);
            animation: statusPulse 2s infinite cubic-bezier(0.4, 0, 0.2, 1);
            z-index: -1;
        }

        /* ==========================================================================
           6. TYPOGRAPHY & IDENTITY
           ========================================================================== */
        
        .user-identity {
            text-align: center;
            margin-bottom: 24px;
            width: 100%;
            transform: translateZ(20px);
        }

        .username {
            font-family: 'Poppins', sans-serif;
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            text-shadow: 0 4px 12px rgba(0,0,0,0.5);
            display: inline-block;
        }

        /* Text-based Status Container */
        .status-text-container {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
            transition: all var(--ease-normal);
        }

        .status-text-indicator {
            width: 8px;
            height: 8px;
            border-radius: var(--radius-round);
            background-color: var(--status-offline);
            transition: background-color var(--ease-normal), box-shadow var(--ease-normal);
        }

        .status-text-indicator.online {
            background-color: var(--status-online);
            box-shadow: 0 0 8px var(--status-online-glow);
        }

        .status-text {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            transition: color var(--ease-normal);
        }

        .status-text.online {
            color: #d1d5db; /* Brighter when online */
        }

        /* Subtle Divider */
        .separator {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(255,255,255,0.1) 50%, 
                transparent 100%);
            margin: 0 0 24px 0;
        }

        /* ==========================================================================
           7. CONNECTIONS (DISCORD, SPOTIFY, GITHUB)
           ========================================================================== */
        
        .connections-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
            transform: translateZ(15px);
        }

        .section-label {
            font-size: 11px;
            text-transform: uppercase;
            font-weight: 800;
            color: var(--text-tertiary);
            letter-spacing: 1.5px;
            margin-bottom: 4px;
            align-self: flex-start;
        }

        .btn-connection {
            display: flex;
            align-items: center;
            width: 100%;
            padding: 14px 20px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all var(--ease-normal);
            text-decoration: none;
        }

        /* Left Icon Area */
        .btn-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            margin-right: 14px;
            font-size: 20px;
            transition: transform var(--ease-bounce), color var(--ease-normal);
            position: relative;
            z-index: 2;
        }

        /* Right Text Area */
        .btn-text {
            position: relative;
            z-index: 2;
            transition: color var(--ease-normal);
        }

        /* Background sweep for hover */
        .btn-connection::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255,255,255,0.05), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1;
        }

        /* Discord Button Specifics */
        .btn-discord:hover {
            background: rgba(88, 101, 242, 0.08);
            border-color: rgba(88, 101, 242, 0.4);
            box-shadow: 0 4px 20px rgba(88, 101, 242, 0.2),
                        inset 0 0 0 1px rgba(88, 101, 242, 0.1);
            transform: translateY(-2px);
        }
        
        .btn-discord:hover .btn-icon {
            color: var(--brand-discord);
            transform: scale(1.15) rotate(-5deg);
        }

        .btn-discord:hover .btn-text {
            color: #ffffff;
        }

        .btn-discord:hover::before {
            transform: translateX(100%);
        }

        /* Spotify Button Specifics */
        .btn-spotify:hover {
            background: rgba(29, 185, 84, 0.08);
            border-color: rgba(29, 185, 84, 0.4);
            box-shadow: 0 4px 20px rgba(29, 185, 84, 0.2),
                        inset 0 0 0 1px rgba(29, 185, 84, 0.1);
            transform: translateY(-2px);
        }

        .btn-spotify:hover .btn-icon {
            color: var(--brand-spotify);
            transform: scale(1.15) rotate(5deg);
        }

        .btn-spotify:hover .btn-text {
            color: #ffffff;
        }

        .btn-spotify:hover::before {
            transform: translateX(100%);
        }

        /* GitHub Button Specifics */
        .btn-github:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 4px 20px rgba(255, 255, 255, 0.1),
                        inset 0 0 0 1px rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .btn-github:hover .btn-icon {
            color: var(--brand-github);
            transform: scale(1.15) rotate(-5deg);
        }

        .btn-github:hover .btn-text {
            color: #ffffff;
        }

        .btn-github:hover::before {
            transform: translateX(100%);
        }

        /* Active Click State */
        .btn-connection:active {
            transform: translateY(1px);
            transition: all var(--ease-fast);
        }

        /* ==========================================================================
           8. KEYFRAME ANIMATIONS
           ========================================================================== */
        
        @keyframes cardDropIn {
            0% {
                opacity: 0;
                transform: translateY(60px) scale(0.9) rotateX(-15deg);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1) rotateX(0deg);
            }
        }

        @keyframes breatheGlow {
            0% { 
                transform: scale(1);
                opacity: 0.6;
            }
            50% {
                transform: scale(1.05);
                opacity: 1;
            }
            100% { 
                transform: scale(1);
                opacity: 0.6;
            }
        }

        @keyframes statusPulse {
            0% { transform: scale(1); opacity: 0.6; }
            70% { transform: scale(2.2); opacity: 0; }
            100% { transform: scale(2.2); opacity: 0; }
        }

        /* ==========================================================================
           9. RESPONSIVE MEDIA QUERIES
           ========================================================================== */
        
        @media (max-width: 400px) {
            :root {
                --card-width: 100%;
            }
            .profile-wrapper {
                padding: 16px;
            }
            .profile-card {
                padding: 30px 20px 24px 20px;
            }
            .avatar-wrapper {
                width: 96px;
                height: 96px;
            }
            .username {
                font-size: 24px;
            }
            .btn-connection {
                padding: 12px 16px;
            }
        }

    </style>
</head>
<body>

    <div class="ambient-glow" id="ambient-glow"></div>
    <canvas id="particle-canvas"></canvas>

    <main class="profile-wrapper" id="tracking-wrapper">
        
        <article class="profile-card" id="glass-card">
            
            <section class="avatar-section">
                <div class="avatar-wrapper">
                    <img src="https://i.ibb.co/svJjnD3C/avatar.jpg" 
                         onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgZmlsbD0iIzJiMmQzMSIvPjwvN3ZnPg=='" 
                         alt="hris Avatar" 
                         class="avatar-img">
                    
                    <div class="status-badge">
                        <div class="status-dot" id="avatar-status-dot"></div>
                    </div>
                </div>
            </section>

            <section class="user-identity">
                <h1 class="username">PortalGuy</h1>
                
                <div class="status-text-container" id="status-container">
                    <div class="status-text-indicator" id="text-status-dot"></div>
                    <span class="status-text" id="status-text">Checking status...</span>
                </div>
            </section>

            <div class="separator"></div>

            <section class="connections-wrapper">
                <div class="section-label">Connections</div>
                
                <a href="#" target="_blank" class="btn-connection btn-discord" id="btn-discord">
                    <div class="btn-icon">
                        <i class="fa-brands fa-discord"></i>
                    </div>
                    <div class="btn-text">Discord</div>
                </a>

                <a href="#" target="_blank" class="btn-connection btn-spotify" id="btn-spotify">
                    <div class="btn-icon">
                        <i class="fa-brands fa-spotify"></i>
                    </div>
                    <div class="btn-text">Spotify</div>
                </a>

                <a href="#" target="_blank" class="btn-connection btn-github" id="btn-github">
                    <div class="btn-icon">
                        <i class="fa-brands fa-github"></i>
                    </div>
                    <div class="btn-text">GitHub</div>
                </a>
            </section>

        </article>
    </main>

    <script>
        /**
         * ====================================================================
         * CONFIGURATION & VARIABLES
         * Edit these values to customize the profile data and links.
         * ====================================================================
         */
        
        // Social URLs mapping
        const discordURL = "https://discord.gg/HSv5EQbUR2";
        const spotifyURL = "https://open.spotify.com/user/31y4kkefxbpwdybenp22os3ur75m";
        const githubURL = "https://github.com/PortalGuy"; // <-- Add your GitHub URL here
        
        // Discord User ID for Lanyard API (Real-time Status)
        // If left empty or invalid, the script will mock an online status after a delay.
        const discordUserIdForStatus = "1491751915527340185"; // Replace with real ID
        
        /**
         * Apply Link URLs to buttons
         */
        document.getElementById('btn-discord').href = discordURL;
        document.getElementById('btn-spotify').href = spotifyURL;
        document.getElementById('btn-github').href = githubURL; // <-- Connect GitHub link to button


        /**
         * ====================================================================
         * DISCORD REAL-TIME STATUS INTEGRATION (LANYARD API)
         * ====================================================================
         */
        const avatarDot = document.getElementById('avatar-status-dot');
        const textDot = document.getElementById('text-status-dot');
        const statusText = document.getElementById('status-text');
        
        // Helper to update DOM based on status state
        function updateStatusUI(isOnline) {
            if (isOnline) {
                avatarDot.classList.add('online');
                textDot.classList.add('online');
                statusText.classList.add('online');
                statusText.textContent = "Online on Discord";
            } else {
                avatarDot.classList.remove('online');
                textDot.classList.remove('online');
                statusText.classList.remove('online');
                statusText.textContent = "Offline";
            }
        }

        // Fetch status from Lanyard API
        async function checkDiscordStatus() {
            // Fallback mock if no ID provided
            if (!discordUserIdForStatus || discordUserIdForStatus === "YOUR_DISCORD_ID") {
                console.warn("No valid Discord ID provided. Mocking online status.");
                updateStatusUI(true);
                return;
            }

            try {
                const response = await fetch(`https://api.lanyard.rest/v1/users/${discordUserIdForStatus}`);
                const resData = await response.json();

                if (resData.success && resData.data) {
                    // Check discord_status: online, idle, dnd, offline
                    const status = resData.data.discord_status;
                    const isOnline = (status !== "offline");
                    updateStatusUI(isOnline);
                } else {
                    // Fail gracefully
                    updateStatusUI(false);
                }
            } catch (error) {
                console.error("Failed to fetch Discord status:", error);
                updateStatusUI(false); // Default offline on error
            }
        }

        // Initial Check
        checkDiscordStatus();

        // Repeated checks every 10 seconds (10000 ms) as requested
        setInterval(checkDiscordStatus, 10000);


        /**
         * ====================================================================
         * 3D PARALLAX CARD EFFECT
         * ====================================================================
         */
        const trackingWrapper = document.getElementById('tracking-wrapper');
        const glassCard = document.getElementById('glass-card');
        
        // Mouse Move mapping to 3D rotation
        trackingWrapper.addEventListener('mousemove', (e) => {
            const rect = trackingWrapper.getBoundingClientRect();
            // Calculate cursor position relative to the center of the card
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            
            // Calculate rotation percentages
            // X rotation is driven by Y mouse position, Y rotation driven by X
            const rotateX = ((y - centerY) / centerY) * -12; // Inverted for natural tilt
            const rotateY = ((x - centerX) / centerX) * 12;
            
            // Apply transform dynamically
            glassCard.style.transform = `translateY(-8px) scale(1.02) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });

        // Reset tracking on mouse leave
        trackingWrapper.addEventListener('mouseleave', () => {
            // Smoothly snap back to resting state
            glassCard.style.transform = `translateY(0) scale(1) rotateX(0deg) rotateY(0deg)`;
        });


        /**
         * ====================================================================
         * ADVANCED PARTICLE ENGINE (CANVAS)
         * Creates floating particles that react slightly to mouse movement.
         * ====================================================================
         */
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        
        let particlesArray = [];
        let mouse = {
            x: null,
            y: null,
            radius: 100 // Repulsion field size
        };

        // Resize handler to fill screen
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', () => {
            resizeCanvas();
            initParticles(); // Reinitialize particles based on new dimensions
        });

        // Mouse tracking for particles
        window.addEventListener('mousemove', (event) => {
            mouse.x = event.clientX;
            mouse.y = event.clientY;
        });

        // Remove mouse tracking when leaving window bounds
        window.addEventListener('mouseout', () => {
            mouse.x = undefined;
            mouse.y = undefined;
        });

        // Particle Class definition
        class Particle {
            constructor(x, y, dx, dy, size, color) {
                this.x = x;
                this.y = y;
                this.dx = dx;
                this.dy = dy;
                this.size = size;
                this.color = color;
                
                // Original position for elasticity
                this.baseX = this.x;
                this.baseY = this.y;
                
                // Random density for varied movement mass
                this.density = (Math.random() * 20) + 1;
            }

            // Draw method for canvas
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.closePath();
            }

            // Update physics per frame
            update() {
                // Wall collisions (bounce)
                if (this.x > canvas.width || this.x < 0) {
                    this.dx = -this.dx;
                }
                if (this.y > canvas.height || this.y < 0) {
                    this.dy = -this.dy;
                }

                // Interactive Mouse Repulsion
                let distX = mouse.x - this.x;
                let distY = mouse.y - this.y;
                let distance = Math.sqrt(distX * distX + distY * distY);
                
                if (distance < mouse.radius) {
                    // Vector math to push particles away
                    const forceDirectionX = distX / distance;
                    const forceDirectionY = distY / distance;
                    const maxDistance = mouse.radius;
                    const force = (maxDistance - distance) / maxDistance;
                    
                    const pushX = forceDirectionX * force * this.density * 0.5;
                    const pushY = forceDirectionY * force * this.density * 0.5;

                    // Apply push within boundaries
                    if (this.x > this.size && this.x < canvas.width - this.size) {
                        this.x -= pushX;
                    }
                    if (this.y > this.size && this.y < canvas.height - this.size) {
                        this.y -= pushY;
                    }
                } else {
                    // Elastic return slightly to base trajectory
                    if (this.x !== this.baseX) {
                        let dx = this.x - this.baseX;
                        this.x -= dx / 100;
                    }
                    if (this.y !== this.baseY) {
                        let dy = this.y - this.baseY;
                        this.y -= dy / 100;
                    }
                }

                // Standard linear movement
                this.x += this.dx;
                this.y += this.dy;

                this.draw();
            }
        }

        // Initialize particles based on screen density
        function initParticles() {
            particlesArray = [];
            // Target roughly 1 particle per 10,000 pixels of area
            let numberOfParticles = Math.floor((canvas.width * canvas.height) / 10000);
            
            // Limit absolute max to prevent lag
            if(numberOfParticles > 150) numberOfParticles = 150;
            
            for (let i = 0; i < numberOfParticles; i++) {
                let size = (Math.random() * 2) + 0.5;
                let x = (Math.random() * ((innerWidth - size * 2) - (size * 2)) + size * 2);
                let y = (Math.random() * ((innerHeight - size * 2) - (size * 2)) + size * 2);
                
                // Very slow drift speed
                let dx = (Math.random() * 0.5) - 0.25;
                let dy = (Math.random() * 0.5) - 0.25;
                
                // Color palette array (White, subtle Blue/Discord, subtle Green/Spotify)
                const colorPalette = [
                    'rgba(255, 255, 255, 0.1)',
                    'rgba(255, 255, 255, 0.2)',
                    'rgba(88, 101, 242, 0.15)',
                    'rgba(29, 185, 84, 0.1)'
                ];
                let color = colorPalette[Math.floor(Math.random() * colorPalette.length)];

                particlesArray.push(new Particle(x, y, dx, dy, size, color));
            }
        }

        // Draw connecting lines between close particles (Constellation effect)
        function connectParticles() {
            let opacityValue = 1;
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    let distance = ((particlesArray[a].x - particlesArray[b].x) * (particlesArray[a].x - particlesArray[b].x))
                                 + ((particlesArray[a].y - particlesArray[b].y) * (particlesArray[a].y - particlesArray[b].y));
                    
                    // Connection distance threshold
                    if (distance < (canvas.width / 12) * (canvas.height / 12)) {
                        opacityValue = 1 - (distance / 15000);
                        ctx.strokeStyle = `rgba(255, 255, 255, ${opacityValue * 0.04})`;
                        ctx.lineWidth = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                        ctx.stroke();
                        ctx.closePath();
                    }
                }
            }
        }

        // Main Animation Loop
        function animateParticles() {
            requestAnimationFrame(animateParticles);
            // Clear previous frame
            ctx.clearRect(0, 0, innerWidth, innerHeight);

            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
            }
            
            // Draw lines after particles to overlay correctly
            connectParticles();
        }

        // Bootstrap the canvas engine
        resizeCanvas();
        initParticles();
        animateParticles();

    </script>
</body>
</html>
